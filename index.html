<!DOCTYPE html>
<html>
<head>
    <title>Random Password Generator</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 50px;
        }
        input {
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
        }
        .password-box {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<h1>🔐 Random Password Generator</h1>

<form method="POST">
    <label>Enter Password Length:</label>
    <input type="number" name="length" min="4" max="50" required>
    <button type="submit">Generate</button>
</form>

{% if password %}
    <div class="password-box">
        Generated Password: {{ password }}
    </div>
{% endif %}

</body>
</html>
